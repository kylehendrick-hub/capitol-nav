<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000">
  <defs>
    <style>
      .wall { fill: none; stroke: #2d3748; stroke-width: 3; }
      .room { fill: #edf2f7; stroke: #a0aec0; stroke-width: 1; }
      .hallway { fill: #f7fafc; stroke: #cbd5e0; stroke-width: 1; }
      .label { font-family: Arial, sans-serif; font-size: 12px; fill: #4a5568; text-anchor: middle; }
      .title { font-family: Arial, sans-serif; font-size: 18px; fill: #1a202c; font-weight: bold; text-anchor: middle; }
      .wing-label { font-family: Arial, sans-serif; font-size: 14px; fill: #718096; text-anchor: middle; font-style: italic; }
      .amenity { font-family: Arial, sans-serif; font-size: 11px; fill: #3182ce; text-anchor: middle; font-weight: bold; }
      .landmark { fill: #ebf8ff; stroke: #3182ce; stroke-width: 2; }
    </style>
  </defs>
  <text class="title" x="800" y="30">Russell Senate Office Building - Basement</text>
  <!-- Square outline -->
  <rect class="wall" x="50" y="50" width="1500" height="900" rx="5"/>
  <!-- Two interior courtyards -->
  <rect class="wall" x="200" y="250" width="450" height="400" rx="3"/>
  <rect class="wall" x="950" y="250" width="450" height="400" rx="3"/>
  <!-- Central rotunda -->
  <circle class="landmark" cx="800" cy="500" r="70"/>
  <text class="label" x="800" y="505">Rotunda</text>
  <!-- North corridor -->
  <rect class="hallway" x="60" y="150" width="1480" height="50"/>
  <!-- South corridor -->
  <rect class="hallway" x="60" y="700" width="1480" height="50"/>
  <!-- West corridor -->
  <rect class="hallway" x="100" y="150" width="50" height="600"/>
  <!-- East corridor -->
  <rect class="hallway" x="1450" y="150" width="50" height="600"/>
  <!-- Central N-S corridor -->
  <rect class="hallway" x="775" y="150" width="50" height="600"/>
  <!-- Rooms - North west -->
  <rect class="room" x="160" y="60" width="140" height="80"/>
  <text class="label" x="230" y="105">SRB-1</text>
  <rect class="room" x="320" y="60" width="140" height="80"/>
  <text class="label" x="390" y="105">SRB-2</text>
  <rect class="room" x="480" y="60" width="140" height="80"/>
  <text class="label" x="550" y="105">SRB-3</text>
  <!-- Rooms - North east -->
  <rect class="room" x="900" y="60" width="140" height="80"/>
  <text class="label" x="970" y="105">SRB-4</text>
  <rect class="room" x="1060" y="60" width="140" height="80"/>
  <text class="label" x="1130" y="105">SRB-5</text>
  <rect class="room" x="1220" y="60" width="140" height="80"/>
  <text class="label" x="1290" y="105">SRB-6</text>
  <!-- Rooms - South -->
  <rect class="room" x="160" y="760" width="140" height="80"/>
  <text class="label" x="230" y="805">SRB-10</text>
  <rect class="room" x="320" y="760" width="140" height="80"/>
  <text class="label" x="390" y="805">SRB-11</text>
  <rect class="room" x="480" y="760" width="140" height="80"/>
  <text class="label" x="550" y="805">SRB-12</text>
  <rect class="room" x="900" y="760" width="140" height="80"/>
  <text class="label" x="970" y="805">SRB-13</text>
  <rect class="room" x="1060" y="760" width="140" height="80"/>
  <text class="label" x="1130" y="805">SRB-14</text>
  <rect class="room" x="1220" y="760" width="140" height="80"/>
  <text class="label" x="1290" y="805">SRB-15</text>
  <text class="wing-label" x="425" y="240">West Courtyard</text>
  <text class="wing-label" x="1175" y="240">East Courtyard</text>
  <text class="wing-label" x="800" y="140">North</text>
  <text class="wing-label" x="800" y="750">South</text>
  <rect class="landmark" x="660" y="155" width="30" height="30"/>
  <text class="amenity" x="675" y="175">E</text>
  <rect class="landmark" x="900" y="155" width="30" height="30"/>
  <text class="amenity" x="915" y="175">E</text>
  <rect class="landmark" x="660" y="705" width="30" height="30"/>
  <text class="amenity" x="675" y="725">S</text>
  <rect class="landmark" x="900" y="705" width="30" height="30"/>
  <text class="amenity" x="915" y="725">S</text>
  <rect class="landmark" x="380" y="155" width="30" height="30"/>
  <text class="amenity" x="395" y="175">R</text>
  <rect class="landmark" x="1150" y="155" width="30" height="30"/>
  <text class="amenity" x="1165" y="175">R</text>
  <rect class="landmark" x="60" y="430" width="100" height="35"/>
  <text class="amenity" x="110" y="453">TUNNEL</text>
  <rect class="landmark" x="1440" y="430" width="100" height="35"/>
  <text class="amenity" x="1490" y="453">TUNNEL</text>
</svg>