<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2000 1400">
  <defs>
    <style>
      .wall { fill: none; stroke: #2d3748; stroke-width: 3; }
      .room { fill: #edf2f7; stroke: #a0aec0; stroke-width: 1; }
      .hallway { fill: #f7fafc; stroke: #cbd5e0; stroke-width: 1; }
      .label { font-family: Arial, sans-serif; font-size: 12px; fill: #4a5568; text-anchor: middle; }
      .title { font-family: Arial, sans-serif; font-size: 18px; fill: #1a202c; font-weight: bold; text-anchor: middle; }
      .wing-label { font-family: Arial, sans-serif; font-size: 14px; fill: #718096; text-anchor: middle; font-style: italic; }
      .amenity { font-family: Arial, sans-serif; font-size: 11px; fill: #3182ce; text-anchor: middle; font-weight: bold; }
      .landmark { fill: #ebf8ff; stroke: #3182ce; stroke-width: 2; }
    </style>
  </defs>
  <text class="title" x="1000" y="30">United States Capitol - Basement</text>
  <!-- Cruciform shape -->
  <!-- Central body -->
  <rect class="wall" x="600" y="50" width="800" height="1300" rx="5"/>
  <!-- West extension (House wing) -->
  <rect class="wall" x="50" y="400" width="550" height="600" rx="5"/>
  <!-- East extension (Senate wing) - actually north/south but using as wings -->
  <rect class="wall" x="1400" y="400" width="550" height="600" rx="5"/>
  <!-- Central rotunda area -->
  <circle class="wall" cx="1000" cy="700" r="120"/>
  <!-- Main E-W corridor -->
  <rect class="hallway" x="60" y="670" width="1880" height="60"/>
  <!-- Main N-S corridor -->
  <rect class="hallway" x="970" y="60" width="60" height="1280"/>
  <!-- Senate wing corridor -->
  <rect class="hallway" x="1410" y="500" width="530" height="50"/>
  <!-- House wing corridor -->
  <rect class="hallway" x="60" y="500" width="530" height="50"/>
  <!-- Rooms - North (Senate side) -->
  <rect class="room" x="650" y="70" width="150" height="100"/>
  <text class="label" x="725" y="125">SB-1</text>
  <rect class="room" x="650" y="180" width="150" height="100"/>
  <text class="label" x="725" y="235">SB-2</text>
  <rect class="room" x="1100" y="70" width="150" height="100"/>
  <text class="label" x="1175" y="125">SB-3</text>
  <rect class="room" x="1100" y="180" width="150" height="100"/>
  <text class="label" x="1175" y="235">SB-4</text>
  <!-- Rooms - South (House side) -->
  <rect class="room" x="650" y="1100" width="150" height="100"/>
  <text class="label" x="725" y="1155">HB-1</text>
  <rect class="room" x="650" y="1210" width="150" height="100"/>
  <text class="label" x="725" y="1265">HB-2</text>
  <rect class="room" x="1100" y="1100" width="150" height="100"/>
  <text class="label" x="1175" y="1155">HB-3</text>
  <rect class="room" x="1100" y="1210" width="150" height="100"/>
  <text class="label" x="1175" y="1265">HB-4</text>
  <!-- West wing rooms -->
  <rect class="room" x="70" y="420" width="150" height="80"/>
  <text class="label" x="145" y="465">HB-10</text>
  <rect class="room" x="240" y="420" width="150" height="80"/>
  <text class="label" x="315" y="465">HB-11</text>
  <rect class="room" x="70" y="820" width="150" height="80"/>
  <text class="label" x="145" y="865">HB-12</text>
  <rect class="room" x="240" y="820" width="150" height="80"/>
  <text class="label" x="315" y="865">HB-13</text>
  <!-- East wing rooms -->
  <rect class="room" x="1420" y="420" width="150" height="80"/>
  <text class="label" x="1495" y="465">SB-10</text>
  <rect class="room" x="1590" y="420" width="150" height="80"/>
  <text class="label" x="1665" y="465">SB-11</text>
  <rect class="room" x="1420" y="820" width="150" height="80"/>
  <text class="label" x="1495" y="865">SB-12</text>
  <rect class="room" x="1590" y="820" width="150" height="80"/>
  <text class="label" x="1665" y="865">SB-13</text>
  <text class="wing-label" x="1000" y="200">North (Senate Side)</text>
  <text class="wing-label" x="1000" y="1200">South (House Side)</text>
  <text class="wing-label" x="325" y="700">West</text>
  <text class="wing-label" x="1675" y="700">East</text>
  <rect class="landmark" x="870" y="675" width="30" height="30"/>
  <text class="amenity" x="885" y="695">E</text>
  <rect class="landmark" x="1100" y="675" width="30" height="30"/>
  <text class="amenity" x="1115" y="695">E</text>
  <rect class="landmark" x="800" y="675" width="30" height="30"/>
  <text class="amenity" x="815" y="695">S</text>
  <rect class="landmark" x="1170" y="675" width="30" height="30"/>
  <text class="amenity" x="1185" y="695">S</text>
  <rect class="landmark" x="930" y="500" width="30" height="30"/>
  <text class="amenity" x="945" y="520">R</text>
  <rect class="landmark" x="930" y="850" width="30" height="30"/>
  <text class="amenity" x="945" y="870">R</text>
  <!-- Tunnels -->
  <rect class="landmark" x="60" y="580" width="100" height="35"/>
  <text class="amenity" x="110" y="603">TUNNEL</text>
  <rect class="landmark" x="1840" y="580" width="100" height="35"/>
  <text class="amenity" x="1890" y="603">TUNNEL</text>
  <rect class="landmark" x="950" y="1320" width="100" height="35"/>
  <text class="amenity" x="1000" y="1343">TUNNEL</text>
</svg>