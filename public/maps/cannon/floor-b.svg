<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000">
  <defs>
    <style>
      .wall { fill: none; stroke: #2d3748; stroke-width: 3; }
      .room { fill: #edf2f7; stroke: #a0aec0; stroke-width: 1; }
      .hallway { fill: #f7fafc; stroke: #cbd5e0; stroke-width: 1; }
      .label { font-family: Arial, sans-serif; font-size: 12px; fill: #4a5568; text-anchor: middle; }
      .title { font-family: Arial, sans-serif; font-size: 18px; fill: #1a202c; font-weight: bold; text-anchor: middle; }
      .wing-label { font-family: Arial, sans-serif; font-size: 14px; fill: #718096; text-anchor: middle; font-style: italic; }
      .amenity { font-family: Arial, sans-serif; font-size: 11px; fill: #3182ce; text-anchor: middle; font-weight: bold; }
      .landmark { fill: #ebf8ff; stroke: #3182ce; stroke-width: 2; }
    </style>
  </defs>
  <text class="title" x="800" y="30">Cannon House Office Building - Basement</text>
  <!-- Square building outline -->
  <rect class="wall" x="50" y="50" width="1500" height="900" rx="5"/>
  <!-- Interior courtyard -->
  <rect class="wall" x="400" y="280" width="800" height="440" rx="3"/>
  <!-- Rotunda circle at center -->
  <circle class="wall" cx="800" cy="500" r="80"/>
  <!-- North corridor -->
  <rect class="hallway" x="60" y="180" width="1480" height="50"/>
  <!-- South corridor -->
  <rect class="hallway" x="60" y="770" width="1480" height="50"/>
  <!-- West corridor -->
  <rect class="hallway" x="200" y="180" width="50" height="640"/>
  <!-- East corridor -->
  <rect class="hallway" x="1350" y="180" width="50" height="640"/>
  <!-- Rooms - North side -->
  <rect class="room" x="100" y="60" width="130" height="110"/>
  <text class="label" x="165" y="120">B-1</text>
  <rect class="room" x="260" y="60" width="130" height="110"/>
  <text class="label" x="325" y="120">B-2</text>
  <rect class="room" x="500" y="60" width="130" height="110"/>
  <text class="label" x="565" y="120">B-3</text>
  <rect class="room" x="660" y="60" width="130" height="110"/>
  <text class="label" x="725" y="120">B-4</text>
  <rect class="room" x="820" y="60" width="130" height="110"/>
  <text class="label" x="885" y="120">B-5</text>
  <rect class="room" x="980" y="60" width="130" height="110"/>
  <text class="label" x="1045" y="120">B-6</text>
  <rect class="room" x="1210" y="60" width="130" height="110"/>
  <text class="label" x="1275" y="120">B-7</text>
  <rect class="room" x="1370" y="60" width="130" height="110"/>
  <text class="label" x="1435" y="120">B-8</text>
  <!-- Rooms - South side -->
  <rect class="room" x="100" y="830" width="130" height="100"/>
  <text class="label" x="165" y="885">B-9</text>
  <rect class="room" x="260" y="830" width="130" height="100"/>
  <text class="label" x="325" y="885">B-10</text>
  <rect class="room" x="500" y="830" width="130" height="100"/>
  <text class="label" x="565" y="885">B-11</text>
  <rect class="room" x="660" y="830" width="130" height="100"/>
  <text class="label" x="725" y="885">B-12</text>
  <rect class="room" x="980" y="830" width="130" height="100"/>
  <text class="label" x="1045" y="885">B-13</text>
  <rect class="room" x="1210" y="830" width="130" height="100"/>
  <text class="label" x="1275" y="885">B-14</text>
  <!-- Wing labels -->
  <text class="wing-label" x="800" y="170">North</text>
  <text class="wing-label" x="800" y="860">South</text>
  <text class="wing-label" x="120" y="500">West</text>
  <text class="wing-label" x="1480" y="500">East</text>
  <!-- Elevators -->
  <rect class="landmark" x="420" y="185" width="30" height="30"/>
  <text class="amenity" x="435" y="205">E</text>
  <rect class="landmark" x="1150" y="185" width="30" height="30"/>
  <text class="amenity" x="1165" y="205">E</text>
  <!-- Stairs -->
  <rect class="landmark" x="480" y="185" width="30" height="30"/>
  <text class="amenity" x="495" y="205">S</text>
  <rect class="landmark" x="1090" y="185" width="30" height="30"/>
  <text class="amenity" x="1105" y="205">S</text>
  <!-- Restrooms -->
  <rect class="landmark" x="750" y="185" width="30" height="30"/>
  <text class="amenity" x="765" y="205">R</text>
  <rect class="landmark" x="820" y="775" width="30" height="30"/>
  <text class="amenity" x="835" y="795">R</text>
  <!-- Tunnel -->
  <rect class="landmark" x="60" y="470" width="100" height="35"/>
  <text class="amenity" x="110" y="493">TUNNEL</text>
</svg>