<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1000">
  <defs>
    <style>
      .wall { fill: none; stroke: #2d3748; stroke-width: 3; }
      .room { fill: #edf2f7; stroke: #a0aec0; stroke-width: 1; }
      .hallway { fill: #f7fafc; stroke: #cbd5e0; stroke-width: 1; }
      .label { font-family: Arial, sans-serif; font-size: 12px; fill: #4a5568; text-anchor: middle; }
      .title { font-family: Arial, sans-serif; font-size: 18px; fill: #1a202c; font-weight: bold; text-anchor: middle; }
      .wing-label { font-family: Arial, sans-serif; font-size: 14px; fill: #718096; text-anchor: middle; font-style: italic; }
      .amenity { font-family: Arial, sans-serif; font-size: 11px; fill: #3182ce; text-anchor: middle; font-weight: bold; }
      .landmark { fill: #ebf8ff; stroke: #3182ce; stroke-width: 2; }
    </style>
  </defs>
  <text class="title" x="700" y="30">Library of Congress - Adams Building - 1st Floor</text>
  <!-- Rectangular Art Deco building -->
  <rect class="wall" x="50" y="50" width="1300" height="900" rx="3"/>
  <!-- Art Deco stepped entrance detail -->
  <rect class="wall" x="550" y="910" width="300" height="40" rx="2"/>
  <!-- Main E-W corridor -->
  <rect class="hallway" x="60" y="460" width="1280" height="60"/>
  <!-- N-S corridors -->
  <rect class="hallway" x="350" y="60" width="50" height="880"/>
  <rect class="hallway" x="1000" y="60" width="50" height="880"/>
  <!-- Secondary corridor -->
  <rect class="hallway" x="60" y="250" width="1280" height="40"/>
  <!-- North rooms - west section -->
  <rect class="room" x="70" y="70" width="260" height="170"/>
  <text class="label" x="200" y="160">LA-100</text>
  <rect class="room" x="420" y="70" width="200" height="170"/>
  <text class="label" x="520" y="160">LA-101</text>
  <rect class="room" x="640" y="70" width="200" height="170"/>
  <text class="label" x="740" y="160">LA-102</text>
  <!-- North rooms - east section -->
  <rect class="room" x="860" y="70" width="130" height="170"/>
  <text class="label" x="925" y="160">LA-103</text>
  <rect class="room" x="1070" y="70" width="130" height="170"/>
  <text class="label" x="1135" y="160">LA-104</text>
  <rect class="room" x="1210" y="70" width="120" height="170"/>
  <text class="label" x="1270" y="160">LA-105</text>
  <!-- Middle rooms -->
  <rect class="room" x="70" y="310" width="260" height="130"/>
  <text class="label" x="200" y="380">LA-110</text>
  <rect class="room" x="420" y="310" width="260" height="130"/>
  <text class="label" x="550" y="380">LA-111</text>
  <rect class="room" x="1070" y="310" width="260" height="130"/>
  <text class="label" x="1200" y="380">LA-112</text>
  <!-- South rooms -->
  <rect class="room" x="70" y="540" width="260" height="150"/>
  <text class="label" x="200" y="620">LA-120</text>
  <rect class="room" x="420" y="540" width="260" height="150"/>
  <text class="label" x="550" y="620">LA-121</text>
  <rect class="room" x="1070" y="540" width="260" height="150"/>
  <text class="label" x="1200" y="620">LA-122</text>
  <rect class="room" x="70" y="710" width="260" height="170"/>
  <text class="label" x="200" y="800">LA-130</text>
  <rect class="room" x="420" y="710" width="260" height="170"/>
  <text class="label" x="550" y="800">LA-131</text>
  <rect class="room" x="1070" y="710" width="260" height="170"/>
  <text class="label" x="1200" y="800">LA-132</text>
  <text class="wing-label" x="200" y="455">West</text>
  <text class="wing-label" x="1200" y="455">East</text>
  <!-- Elevators -->
  <rect class="landmark" x="355" y="400" width="30" height="30"/>
  <text class="amenity" x="370" y="420">E</text>
  <rect class="landmark" x="1005" y="400" width="30" height="30"/>
  <text class="amenity" x="1020" y="420">E</text>
  <!-- Stairs -->
  <rect class="landmark" x="355" y="130" width="30" height="30"/>
  <text class="amenity" x="370" y="150">S</text>
  <rect class="landmark" x="1005" y="130" width="30" height="30"/>
  <text class="amenity" x="1020" y="150">S</text>
  <!-- Restrooms -->
  <rect class="landmark" x="700" y="465" width="30" height="30"/>
  <text class="amenity" x="715" y="485">R</text>
  <!-- Entrance -->
  <rect class="landmark" x="620" y="915" width="160" height="30"/>
  <text class="amenity" x="700" y="935">ENTRANCE</text>
</svg>