<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000">
  <defs>
    <style>
      .wall { fill: none; stroke: #2d3748; stroke-width: 3; }
      .room { fill: #edf2f7; stroke: #a0aec0; stroke-width: 1; }
      .hallway { fill: #f7fafc; stroke: #cbd5e0; stroke-width: 1; }
      .label { font-family: Arial, sans-serif; font-size: 12px; fill: #4a5568; text-anchor: middle; }
      .title { font-family: Arial, sans-serif; font-size: 18px; fill: #1a202c; font-weight: bold; text-anchor: middle; }
      .wing-label { font-family: Arial, sans-serif; font-size: 14px; fill: #718096; text-anchor: middle; font-style: italic; }
      .amenity { font-family: Arial, sans-serif; font-size: 11px; fill: #3182ce; text-anchor: middle; font-weight: bold; }
      .landmark { fill: #ebf8ff; stroke: #3182ce; stroke-width: 2; }
    </style>
  </defs>
  <text class="title" x="800" y="30">Dirksen Senate Office Building - Basement</text>
  <!-- U-shape: bottom bar + two vertical arms, open at top (north connects to Hart) -->
  <!-- Left arm -->
  <rect class="wall" x="50" y="50" width="400" height="900" rx="5"/>
  <!-- Right arm -->
  <rect class="wall" x="1150" y="50" width="400" height="900" rx="5"/>
  <!-- Bottom bar -->
  <rect class="wall" x="450" y="550" width="700" height="400" rx="5"/>
  <!-- Left corridor -->
  <rect class="hallway" x="220" y="60" width="50" height="880"/>
  <!-- Right corridor -->
  <rect class="hallway" x="1330" y="60" width="50" height="880"/>
  <!-- Bottom E-W corridor -->
  <rect class="hallway" x="220" y="720" width="1160" height="50"/>
  <!-- North connecting corridor (to Hart) -->
  <rect class="hallway" x="220" y="60" width="1160" height="50"/>
  <!-- Rooms - Left arm west -->
  <rect class="room" x="60" y="120" width="150" height="100"/>
  <text class="label" x="135" y="175">SDB-1</text>
  <rect class="room" x="60" y="230" width="150" height="100"/>
  <text class="label" x="135" y="285">SDB-2</text>
  <rect class="room" x="60" y="340" width="150" height="100"/>
  <text class="label" x="135" y="395">SDB-3</text>
  <rect class="room" x="60" y="450" width="150" height="100"/>
  <text class="label" x="135" y="505">SDB-4</text>
  <rect class="room" x="60" y="560" width="150" height="100"/>
  <text class="label" x="135" y="615">SDB-5</text>
  <rect class="room" x="60" y="780" width="150" height="100"/>
  <text class="label" x="135" y="835">SDB-6</text>
  <!-- Rooms - Left arm east -->
  <rect class="room" x="280" y="120" width="150" height="100"/>
  <text class="label" x="355" y="175">SDB-7</text>
  <rect class="room" x="280" y="230" width="150" height="100"/>
  <text class="label" x="355" y="285">SDB-8</text>
  <!-- Rooms - Right arm west -->
  <rect class="room" x="1160" y="120" width="150" height="100"/>
  <text class="label" x="1235" y="175">SDB-10</text>
  <rect class="room" x="1160" y="230" width="150" height="100"/>
  <text class="label" x="1235" y="285">SDB-11</text>
  <!-- Rooms - Right arm east -->
  <rect class="room" x="1390" y="120" width="150" height="100"/>
  <text class="label" x="1465" y="175">SDB-12</text>
  <rect class="room" x="1390" y="230" width="150" height="100"/>
  <text class="label" x="1465" y="285">SDB-13</text>
  <rect class="room" x="1390" y="340" width="150" height="100"/>
  <text class="label" x="1465" y="395">SDB-14</text>
  <rect class="room" x="1390" y="450" width="150" height="100"/>
  <text class="label" x="1465" y="505">SDB-15</text>
  <!-- Bottom bar rooms -->
  <rect class="room" x="500" y="790" width="150" height="130"/>
  <text class="label" x="575" y="860">SDB-20</text>
  <rect class="room" x="700" y="790" width="150" height="130"/>
  <text class="label" x="775" y="860">SDB-21</text>
  <rect class="room" x="950" y="790" width="150" height="130"/>
  <text class="label" x="1025" y="860">SDB-22</text>
  <text class="wing-label" x="250" y="500">West Wing</text>
  <text class="wing-label" x="1350" y="500">East Wing</text>
  <text class="wing-label" x="800" y="680">South Wing</text>
  <!-- Connection to Hart -->
  <rect class="landmark" x="650" y="52" width="300" height="30"/>
  <text class="amenity" x="800" y="72">CONNECTION TO HART</text>
  <!-- Elevators -->
  <rect class="landmark" x="225" y="400" width="30" height="30"/>
  <text class="amenity" x="240" y="420">E</text>
  <rect class="landmark" x="1335" y="400" width="30" height="30"/>
  <text class="amenity" x="1350" y="420">E</text>
  <!-- Stairs -->
  <rect class="landmark" x="225" y="200" width="30" height="30"/>
  <text class="amenity" x="240" y="220">S</text>
  <rect class="landmark" x="1335" y="200" width="30" height="30"/>
  <text class="amenity" x="1350" y="220">S</text>
  <!-- Restrooms -->
  <rect class="landmark" x="750" y="725" width="30" height="30"/>
  <text class="amenity" x="765" y="745">R</text>
  <!-- Tunnel -->
  <rect class="landmark" x="750" y="915" width="100" height="35"/>
  <text class="amenity" x="800" y="938">TUNNEL</text>
</svg>