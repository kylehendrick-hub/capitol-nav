  <rect class="landmark" x="700" y="155" width="30" height="30"/>
  <text class="amenity" x="715" y="175">E</text>
  <rect class="landmark" x="1140" y="155" width="30" height="30"/>
  <text class="amenity" x="1155" y="175">E</text>
  <rect class="landmark" x="700" y="585" width="30" height="30"/>
  <text class="amenity" x="715" y="605">E</text>
  <rect class="landmark" x="1140" y="585" width="30" height="30"/>
  <text class="amenity" x="1155" y="605">E</text>
  <!-- Stairs -->
  <rect class="landmark" x="400" y="155" width="30" height="30"/>
  <text class="amenity" x="415" y="175">S</text>
  <rect class="landmark" x="1500" y="155" width="30" height="30"/>
  <text class="amenity" x="1515" y="175">S</text>
  <!-- Restrooms -->
  <rect class="landmark" x="920" y="155" width="30" height="30"/>
  <text class="amenity" x="935" y="175">R</text>
  <rect class="landmark" x="920" y="585" width="30" height="30"/>
  <text class="amenity" x="935" y="605">R</text>
