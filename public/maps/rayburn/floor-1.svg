<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2000 1200">
  <defs>
    <style>
      .wall { fill: none; stroke: #2d3748; stroke-width: 3; }
      .room { fill: #edf2f7; stroke: #a0aec0; stroke-width: 1; }
      .hallway { fill: #f7fafc; stroke: #cbd5e0; stroke-width: 1; }
      .label { font-family: Arial, sans-serif; font-size: 12px; fill: #4a5568; text-anchor: middle; }
      .title { font-family: Arial, sans-serif; font-size: 18px; fill: #1a202c; font-weight: bold; text-anchor: middle; }
      .wing-label { font-family: Arial, sans-serif; font-size: 14px; fill: #718096; text-anchor: middle; font-style: italic; }
      .amenity { font-family: Arial, sans-serif; font-size: 11px; fill: #3182ce; text-anchor: middle; font-weight: bold; }
      .landmark { fill: #ebf8ff; stroke: #3182ce; stroke-width: 2; }
    </style>
  </defs>
  <text class="title" x="1000" y="30">Rayburn House Office Building - 1st Floor</text>
  <rect class="wall" x="50" y="50" width="1900" height="1100" rx="5"/>
  <!-- Three courtyards -->
  <rect class="wall" x="250" y="220" width="500" height="350" rx="3"/>
  <rect class="wall" x="800" y="220" width="400" height="350" rx="3"/>
  <rect class="wall" x="1250" y="220" width="500" height="350" rx="3"/>
  <!-- North corridor -->
  <rect class="hallway" x="60" y="150" width="1880" height="60"/>
  <!-- South corridor -->
  <rect class="hallway" x="60" y="580" width="1880" height="60"/>
  <!-- West corridor -->
  <rect class="hallway" x="140" y="150" width="60" height="490"/>
  <!-- East corridor -->
  <rect class="hallway" x="1800" y="150" width="60" height="490"/>
  <!-- Inter-courtyard corridors -->
  <rect class="hallway" x="760" y="150" width="60" height="490"/>
  <rect class="hallway" x="1200" y="150" width="60" height="490"/>
  <!-- Rooms - North side -->
  <rect class="room" x="210" y="65" width="110" height="80"/>
  <text class="label" x="265" y="110">2101</text>
  <rect class="room" x="330" y="65" width="110" height="80"/>
  <text class="label" x="385" y="110">2102</text>
  <rect class="room" x="450" y="65" width="110" height="80"/>
  <text class="label" x="505" y="110">2103</text>
  <rect class="room" x="570" y="65" width="110" height="80"/>
  <text class="label" x="625" y="110">2104</text>
  <rect class="room" x="830" y="65" width="110" height="80"/>
  <text class="label" x="885" y="110">2105</text>
  <rect class="room" x="950" y="65" width="110" height="80"/>
  <text class="label" x="1005" y="110">2106</text>
  <rect class="room" x="1270" y="65" width="110" height="80"/>
  <text class="label" x="1325" y="110">2107</text>
  <rect class="room" x="1390" y="65" width="110" height="80"/>
  <text class="label" x="1445" y="110">2108</text>
  <rect class="room" x="1510" y="65" width="110" height="80"/>
  <text class="label" x="1565" y="110">2109</text>
  <rect class="room" x="1630" y="65" width="110" height="80"/>
  <text class="label" x="1685" y="110">2110</text>
  <!-- Rooms - South side -->
  <rect class="room" x="210" y="650" width="110" height="80"/>
  <text class="label" x="265" y="695">2125</text>
  <rect class="room" x="330" y="650" width="110" height="80"/>
  <text class="label" x="385" y="695">2126</text>
  <rect class="room" x="450" y="650" width="110" height="80"/>
  <text class="label" x="505" y="695">2127</text>
  <rect class="room" x="570" y="650" width="110" height="80"/>
  <text class="label" x="625" y="695">2128</text>
  <rect class="room" x="830" y="650" width="110" height="80"/>
  <text class="label" x="885" y="695">2129</text>
  <rect class="room" x="950" y="650" width="110" height="80"/>
  <text class="label" x="1005" y="695">2130</text>
